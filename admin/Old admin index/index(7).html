<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. John's College — Post Announcement</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #f9f9f9;
            font-family: 'Times New Roman', serif;
            min-height: 100vh;
        }

        body.no-scroll {
            overflow: hidden;
            height: 100vh;
        }

        .top-bar {
            width: 100%;
            height: 100px;
            background-color: #1d6737;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            overflow: hidden;
        }

        .top-bar img {
            height: 85px;
            width: 85px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .top-bar h1 {
            font-family: 'Arial', sans-serif;
            font-size: 34px;
            margin-left: 16px;
            color: #ffffff;
            font-weight: bold;
            white-space: nowrap;
        }

        .top-bar p {
            font-family: 'Times New Roman', serif;
            font-size: 25px;
            margin-left: 16px;
            color: #ffffff;
            white-space: nowrap;
            display: block;
        }

        .college-name {
            flex-shrink: 0;
            white-space: nowrap;
        }

        .datetime-widget {
            margin-left: auto;
            flex-shrink: 0;
            white-space: nowrap;
            text-align: right;
            padding-right: 16px;
        }

        /* --- DATE  <h1> --- */
        h1#live-date {
            font-size: 28px;
            color: #ffffff;
            white-space: nowrap;
            margin-left: 0;
        }

        /* --- TIME  <p> --- */
        p#live-time {
            font-size: 22px;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: 0.08em;
            white-space: nowrap;
            margin-left: 0;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            font-family: 'Arial', sans-serif;
            font-size: 22px;
            color: #1d6737;
            border-bottom: 3px solid #1d6737;
            padding-bottom: 8px;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 16px;
            color: #333;
            margin-bottom: 6px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
        }

        input[type="text"], input[type="file"], textarea {
            width: 100%;
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 4px;
            padding: 10px 12px;
            margin-bottom: 18px;
            transition: border-color 0.2s;
            outline: none;
            background: #fff;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #1d6737;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            font-family: 'Arial', sans-serif;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-post { background-color: #1d6737; color: #fff; }
        .btn-post:hover:not(:disabled) { background-color: #155228; }

        .btn-clear { background-color: #c0392b; color: #fff; }
        .btn-clear:hover:not(:disabled) { background-color: #96281b; }

        .btn-view { background-color: #555; color: #fff; }
        .btn-view:hover { background-color: #333; }

        .btn-logout { background: none; color: #555; border: 1px solid #999; }
        .btn-logout:hover { background: #eee; }

        .toast {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 4px;
            font-family: 'Arial', sans-serif;
            font-size: 15px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .posted-section { margin-top: 40px; }
        .posted-section h2 { margin-bottom: 16px; }

        .announcement-card {
            background: #fff;
            border-left: 6px solid #1d6737;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            padding: 12px 16px;
            margin-bottom: 12px;
            position: relative;
        }

        .announcement-card img.thumb {
            max-width: 100%;
            max-height: 160px;
            object-fit: contain;
            display: block;
            margin-top: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
        }

        .announcement-card video.thumb {
            max-width: 100%;
            max-height: 200px;
            display: block;
            margin-top: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
            background: #000;
        }

        .announcement-card .attachment-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .announcement-card .attachment-tags a {
            font-family: 'Arial', sans-serif;
            font-size: 12px;
            color: #1d6737;
            background: #eef6f0;
            border: 1px solid #1d6737;
            border-radius: 10px;
            padding: 3px 10px;
            text-decoration: none;
        }

        .announcement-card .attachment-tags a:hover {
            background: #1d6737;
            color: #fff;
        }

        .selected-files {
            list-style: none;
            font-family: 'Arial', sans-serif;
            font-size: 13px;
            color: #444;
            margin: -10px 0 18px;
        }

        .selected-files li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f2f2f2;
            border-radius: 4px;
            padding: 5px 10px;
            margin-top: 6px;
        }

        .selected-files li button {
            border: none;
            background: none;
            color: #c0392b;
            font-family: 'Arial', sans-serif;
            font-size: 12px;
            cursor: pointer;
            padding: 0;
        }

        .announcement-card .card-title {
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            font-weight: bold;
            color: #1d6737;
            margin-bottom: 4px;
        }

        .announcement-card .card-body {
            font-size: 15px;
            color: #222;
            white-space: pre-wrap;
        }

        .announcement-card .card-meta {
            font-family: 'Arial', sans-serif;
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: 1px solid #c0392b;
            color: #c0392b;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn-delete:hover { background: #c0392b; color: #fff; }

        .no-announcements { color: #888; font-size: 16px; }

        .container.blurred {
            filter: blur(6px);
            pointer-events: none;
            user-select: none;
        }

        .lock-overlay {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .lock-box {
            background: #ffffff;
            width: 90%;
            max-width: 360px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            padding: 28px 26px;
        }

        .lock-box h3 {
            font-family: 'Arial', sans-serif;
            color: #1d6737;
            font-size: 20px;
            margin-bottom: 18px;
            text-align: center;
        }

        .lock-box label {
            display: block;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
        }

        .lock-box input[type="text"],
        .lock-box input[type="password"] {
            width: 100%;
            font-family: 'Times New Roman', serif;
            font-size: 15px;
            border: 2px solid #ccc;
            border-radius: 4px;
            padding: 9px 11px;
            margin-bottom: 14px;
            outline: none;
            background: #fff;
        }

        .lock-box input[type="text"]:focus,
        .lock-box input[type="password"]:focus {
            border-color: #1d6737;
        }

        .lock-box button {
            width: 100%;
            font-family: 'Arial', sans-serif;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #1d6737;
            color: #fff;
            transition: background 0.2s;
        }

        .lock-box button:hover { background-color: #155228; }

        .lock-error {
            display: none;
            font-family: 'Arial', sans-serif;
            font-size: 13px;
            color: #c0392b;
            margin-top: -6px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body class="no-scroll">

<div class="top-bar">
    <img src="https://i.ibb.co/qLk93D58/college-logo.jpg" alt="college emblem">
    <div class="college-name">
        <h1>St. John's College</h1>
        <p>Notice Board — Admin</p>
    </div>
    <div class="datetime-widget">
        <h1 id="live-date">Loading date…</h1>
        <p id="live-time">Loading time…</p>
    </div>
</div>

<div class="lock-overlay" id="lock-overlay">
    <div class="lock-box">
        <h3>Admin Login Required</h3>
        <label for="lock-email">Email</label>
        <input type="text" id="lock-email" placeholder="admin@stjohns.co.zw" autocomplete="username">
        <label for="lock-password">Password</label>
        <input type="password" id="lock-password" placeholder="Enter password" autocomplete="current-password">
        <p class="lock-error" id="lock-error">Incorrect email or password.</p>
        <button onclick="checkLogin()">Log In</button>
    </div>
</div>

<div class="container blurred" id="main-container">
    <h2>Post an Announcement</h2>

    <label for="ann-title">Title</label>
    <input type="text" id="ann-title" placeholder="e.g. Sports Day Reminder">

    <label for="ann-body">Message (optional)</label>
    <textarea id="ann-body" placeholder="Type the announcement text here..."></textarea>

    <label for="ann-image">Image (optional)</label>
    <input type="file" id="ann-image" accept="image/*">

    <label for="ann-video">Video (optional)</label>
    <input type="file" id="ann-video" accept="video/*">

    <label for="ann-files">Attach files (optional, multiple allowed)</label>
    <input type="file" id="ann-files" multiple>
    <ul class="selected-files" id="ann-files-list"></ul>

    <div class="btn-row">
        <button class="btn-post" id="post-btn" onclick="postAnnouncement()">Post Announcement</button>
        <button class="btn-clear" onclick="clearAll()">Clear All Announcements</button>
        <button class="btn-view" onclick="window.open('../index.html','_blank')">View Notice Board</button>
        <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>

    <div class="toast" id="toast"></div>

    <div class="posted-section">
        <h2>Currently Posted</h2>
        <div id="posted-list"><p class="no-announcements">Loading…</p></div>
    </div>
</div>

<!-- Supabase client library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    /* ============================================================
       SUPABASE CONFIG — must match index.html exactly
       ============================================================ */
    const SUPABASE_URL = 'https://qvdnogycmnbctfwcionn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2ZG5vZ3ljbW5iY3Rmd2Npb25uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NzQ2NDgsImV4cCI6MjA5OTI1MDY0OH0.xg7TBLfsHY37GRNnHVvHXGPHHNbxOj9eMjR7MuyD0g8';

    let supabaseClient = null;
    const BUCKET = 'announcement-images';

    /* --- Date / time widget (matches notice board page) --- */
    function ordinalSuffix(day) {
        if (day >= 11 && day <= 13) return 'th';
        switch (day % 10) {
            case 1: return 'st';
            case 2: return 'nd';
            case 3: return 'rd';
            default: return 'th';
        }
    }

    function updateDateTime() {
        const now = new Date();
        const dayNames   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const monthNames = ['January','February','March','April','May','June',
                            'July','August','September','October','November','December'];
        const dayName  = dayNames[now.getDay()];
        const date     = now.getDate();
        const suffix   = ordinalSuffix(date);
        const month    = monthNames[now.getMonth()];
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('live-date').textContent = `${dayName}, ${date}${suffix} ${month}`;
        document.getElementById('live-time').textContent = `${hh}:${mm}:${ss}`;
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    try {
        if (!window.supabase) {
            throw new Error('Supabase library failed to load (check your internet connection or ad-blocker).');
        }
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (initErr) {
        console.error('Supabase init failed:', initErr);
        const errorMsg = document.getElementById('lock-error');
        errorMsg.textContent = 'Setup error: ' + initErr.message;
        errorMsg.style.display = 'block';
    }

    /* --- Auth --- */
    async function checkLogin() {
        const email = document.getElementById('lock-email').value.trim();
        const password = document.getElementById('lock-password').value;
        const errorMsg = document.getElementById('lock-error');
        const btn = document.querySelector('.lock-box button');

        errorMsg.style.display = 'none';

        if (!supabaseClient) {
            errorMsg.textContent = 'Cannot log in: Supabase failed to initialize. Check the browser console (F12) for details.';
            errorMsg.style.display = 'block';
            return;
        }

        if (!email || !password) {
            errorMsg.textContent = 'Please enter both email and password.';
            errorMsg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Logging in…';

        try {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                return;
            }
            unlockUI();
        } catch (err) {
            console.error('Login error:', err);
            errorMsg.textContent = 'Unexpected error: ' + err.message;
            errorMsg.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Log In';
        }
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        location.reload();
    }

    function unlockUI() {
        document.getElementById('lock-overlay').style.display = 'none';
        document.getElementById('main-container').classList.remove('blurred');
        document.body.classList.remove('no-scroll');
        renderPosted();
    }

    // If already logged in (existing session), skip the lock screen
    (async function checkExistingSession() {
        if (!supabaseClient) return;
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) unlockUI();
    })();

    document.getElementById('lock-password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkLogin();
    });
    document.getElementById('lock-email').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkLogin();
    });

    /* --- Helpers --- */
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function formatTimestamp(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })
            + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    /* --- Track multiple attachment files (the native file input replaces its
       whole FileList on every pick, so we keep our own running selection) --- */
    let selectedFiles = [];

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function renderSelectedFiles() {
        const list = document.getElementById('ann-files-list');
        list.innerHTML = selectedFiles.map((f, i) => `
            <li>
                <span>${escapeHtml(f.name)} (${formatFileSize(f.size)})</span>
                <button type="button" data-idx="${i}">Remove</button>
            </li>
        `).join('');
        list.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedFiles.splice(Number(btn.getAttribute('data-idx')), 1);
                renderSelectedFiles();
            });
        });
    }

    document.getElementById('ann-files').addEventListener('change', function() {
        selectedFiles = selectedFiles.concat(Array.from(this.files));
        this.value = '';
        renderSelectedFiles();
    });

    function showToast(msg, success = true) {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        t.style.backgroundColor = success ? '#d4edda' : '#f8d7da';
        t.style.color = success ? '#155724' : '#721c24';
        t.style.borderColor = success ? '#c3e6cb' : '#f5c6cb';
        t.textContent = msg;
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    /* --- Post / delete / clear --- */
    async function uploadOne(file) {
        const ext = file.name.split('.').pop();
        const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
        const { error: uploadError } = await supabaseClient.storage
            .from(BUCKET)
            .upload(path, file);
        if (uploadError) throw uploadError;

        const { data: publicUrlData } = supabaseClient.storage
            .from(BUCKET)
            .getPublicUrl(path);
        return publicUrlData.publicUrl;
    }

    async function postAnnouncement() {
        const title = document.getElementById('ann-title').value.trim();
        const body  = document.getElementById('ann-body').value.trim();
        const fileInput = document.getElementById('ann-image');
        const videoInput = document.getElementById('ann-video');
        const file = fileInput.files[0];
        const videoFile = videoInput.files[0];
        const postBtn = document.getElementById('post-btn');

        if (!title && !body && !file && !videoFile && selectedFiles.length === 0) {
            showToast('Please add a title, message, image, video, or file before posting.', false);
            return;
        }

        postBtn.disabled = true;
        postBtn.textContent = 'Posting…';

        let image_url = null;
        let video_url = null;
        const attachments = [];

        try {
            if (file) {
                postBtn.textContent = 'Uploading image…';
                image_url = await uploadOne(file);
            }

            if (videoFile) {
                postBtn.textContent = 'Uploading video…';
                video_url = await uploadOne(videoFile);
            }

            for (let i = 0; i < selectedFiles.length; i++) {
                postBtn.textContent = `Uploading file ${i + 1} of ${selectedFiles.length}…`;
                const url = await uploadOne(selectedFiles[i]);
                attachments.push({ name: selectedFiles[i].name, url, size: selectedFiles[i].size });
            }

            postBtn.textContent = 'Posting…';

            const { error: insertError } = await supabaseClient
                .from('announcements')
                .insert({ title: title || 'Announcement', body, image_url, video_url, attachments });

            if (insertError) throw insertError;

            showToast('Announcement posted successfully!');
            document.getElementById('ann-title').value = '';
            document.getElementById('ann-body').value = '';
            fileInput.value = '';
            videoInput.value = '';
            selectedFiles = [];
            renderSelectedFiles();
            renderPosted();
        } catch (err) {
            console.error(err);
            showToast('Failed to post: ' + err.message, false);
        } finally {
            postBtn.disabled = false;
            postBtn.textContent = 'Post Announcement';
        }
    }

    async function deleteAnnouncement(id) {
        const { error } = await supabaseClient.from('announcements').delete().eq('id', id);
        if (error) {
            showToast('Failed to delete: ' + error.message, false);
            return;
        }
        showToast('Announcement removed.');
        renderPosted();
    }

    async function clearAll() {
        if (!confirm('Remove all announcements from the notice board?')) return;
        // delete-all: match every row (id is never null)
        const { error } = await supabaseClient.from('announcements').delete().not('id', 'is', null);
        if (error) {
            showToast('Failed to clear: ' + error.message, false);
            return;
        }
        showToast('All announcements cleared.');
        renderPosted();
    }

    async function renderPosted() {
        const list = document.getElementById('posted-list');

        const { data, error } = await supabaseClient
            .from('announcements')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            list.innerHTML = `<p class="no-announcements">Error loading: ${escapeHtml(error.message)}</p>`;
            return;
        }

        if (!data || data.length === 0) {
            list.innerHTML = '<p class="no-announcements">No announcements yet.</p>';
            return;
        }

        list.innerHTML = data.map(a => {
            const attachments = Array.isArray(a.attachments) ? a.attachments : [];
            return `
            <div class="announcement-card">
                <button class="btn-delete" onclick="deleteAnnouncement('${a.id}')">Remove</button>
                <div class="card-title">${escapeHtml(a.title)}</div>
                ${a.body ? `<div class="card-body">${escapeHtml(a.body)}</div>` : ''}
                ${a.image_url ? `<img class="thumb" src="${escapeHtml(a.image_url)}" alt="">` : ''}
                ${a.video_url ? `<video class="thumb" src="${escapeHtml(a.video_url)}" controls preload="metadata"></video>` : ''}
                ${attachments.length ? `
                    <div class="attachment-tags">
                        ${attachments.map(f => `<a href="${escapeHtml(f.url)}" target="_blank" rel="noopener">📎 ${escapeHtml(f.name)}</a>`).join('')}
                    </div>` : ''}
                <div class="card-meta">Posted: ${formatTimestamp(a.created_at)}</div>
            </div>
        `;
        }).join('');
    }
</script>
</body>
</html>
