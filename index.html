<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
        }

        .top-bar {
            width: 100%;
            height: 100px;
            background-color: #50C878;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }

        .top-bar img {
            height: 85px;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <img src="college_logo.jpg" alt="College Logo">
    </div>
</body>
</html>
