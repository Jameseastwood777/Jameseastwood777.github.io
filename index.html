<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apple</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fdf6ec;
      font-family: 'Playfair Display', Georgia, serif;
      overflow: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(220,80,40,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(60,140,60,0.07) 0%, transparent 55%);
      pointer-events: none;
    }

    .card {
      background: #fff;
      border-radius: 28px;
      padding: 48px 56px 40px;
      box-shadow:
        0 2px 0 #e8d5b0,
        0 8px 40px rgba(0,0,0,0.10),
        0 1px 3px rgba(0,0,0,0.06);
      text-align: center;
      animation: rise 0.7s cubic-bezier(.22,1,.36,1) both;
      max-width: 380px;
      width: 90%;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    .apple-wrap {
      display: inline-block;
      animation: float 3.6s ease-in-out infinite;
      filter: drop-shadow(0 12px 24px rgba(180,50,20,0.18));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    svg.apple {
      width: 180px;
      height: 180px;
    }

    h1 {
      margin-top: 28px;
      font-size: 2rem;
      font-weight: 700;
      color: #2a1a0e;
      letter-spacing: -0.5px;
    }

    p {
      margin-top: 8px;
      font-style: italic;
      font-weight: 400;
      font-size: 1rem;
      color: #9a7555;
    }
  </style>
</head>
