<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. John's College Notice Board</title>
    <style>

        h1 {
            font-family: 'Arial', sans-serif;
            font-size: 24px;
            margin-left: 16px;
            color: #ffffff;
            font-weight: bold;
            font-size: 34px;
            white-space: nowrap;
        }

        p1 {
            font-family: 'Times New Roman', serif;
            font-size: 25px;
            margin-left: 16px;
            color: #ffffff;
            white-space: nowrap;
            display: block;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f9f9f9;
        }

        .top-bar {
            width: 100%;
            height: 100px;
            background-color: #1d6737;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            overflow: hidden;
        }

        .top-bar img {
            height: 85px;
            width: 85px;
            object-fit: contain;
            flex-shrink: 0;
        }

        /* --- Time and Date --- */
        body {
        margin-left: 0px;
        min-height: 100vh;
        font-family: 'Times New Roman', serif;
        }

        .college-name {
            flex-shrink: 0;
            white-space: nowrap;
        }

        .datetime-widget {
            margin-left: auto;
            flex-shrink: 0;
            white-space: nowrap;
            text-align: right;
            padding-right: 16px;
        }



        /* --- DATE  <h1> --- */
        h1#live-date {
        font-size: 28px;
        color: #ffffff;
        white-space: nowrap;
        margin-left: 0;
        }

        /* --- TIME  <p> --- */
        p#live-time {
        font-size: 22px;
        font-weight: 400;
        color: #ffffff;
        letter-spacing: 0.08em;
        white-space: nowrap;
        margin-left: 0;
        }

        /* --- Page Layout --- */
        .page-layout {
            display: flex;
            min-height: calc(100vh - 100px);
        }

        .main-content {
            flex: 2;
            background-color: #f9f9f9;
            height: calc(100vh - 100px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-divider {
            width: 4px;
            background-color: #1d6737;
            flex-shrink: 0;
        }

        .sidebar {
            flex: 1;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
        }

        .sidebar-heading {
            font-family: 'Times New Roman', serif;
            font-size: 25px;
            color: #1d6737;
            text-align: center;
            padding: 16px 8px;
        }

        .sidebar-image-container {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            max-height: 50%;
        }

        .sidebar-image-container img {
            width: 100%;
            height: 100%;
            max-height: calc(50vh - 50px);
            display: block;
            object-fit: contain;
        }

        /* --- Announcements Area --- */
        .announcements-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .announcements-heading {
            font-family: 'Times New Roman', serif;
            font-size: 26px;
            color: #1d6737;
            border-bottom: 3px solid #1d6737;
            padding-bottom: 8px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        #announcements-list {
            overflow-y: auto;
            flex: 1;
            min-height: 0;
            scrollbar-width: none;       /* Firefox */
            -ms-overflow-style: none;    /* IE/Edge */
        }

        #announcements-list::-webkit-scrollbar {
            display: none;               /* Chrome/Safari */
        }

        .no-announcements {
            font-family: 'Times New Roman', serif;
            font-size: 18px;
            color: #888;
            text-align: center;
            margin-top: 40px;
        }

        .announcement-card {
            background-color: #ffffff;
            border-left: 6px solid #1d6737;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            padding: 14px 18px;
            margin-bottom: 14px;
        }

        .announcement-card .card-title {
            font-family: 'Arial', sans-serif;
            font-size: 17px;
            font-weight: bold;
            color: #1d6737;
            margin-bottom: 6px;
        }

        .announcement-card .card-image {
            width: 100%;
            max-height: 320px;
            object-fit: contain;
            border-radius: 4px;
            margin-bottom: 10px;
            display: block;
        }

        .announcement-card .card-body {
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            color: #222;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .announcement-card .card-meta {
            font-family: 'Arial', sans-serif;
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="top-bar">
       <!-- IMPORTANT: Replace the src below with the public URL of your hosted college logo image -->
       <img src="https://i.ibb.co/qLk93D58/college-logo.jpg" alt="college emblem" style="width:85px;height:85px;">

       <div class="college-name">
            <h1>St. John's College</h1>
            <p1 style="margin-left: 16px;">Notice Board</p1>
       </div>
        <div class="datetime-widget">
            <h1 id="live-date">Loading date…</h1>
            <p  id="live-time">Loading time…</p>
        </div>
    </div>


  <div class="page-layout">
      <div class="main-content">
          <div class="announcements-area">
              <h2 class="announcements-heading">Announcements</h2>
              <div id="announcements-list">
                  <p class="no-announcements">Loading announcements…</p>
              </div>
          </div>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar">
          <h2 id="sidebar-heading" class="sidebar-heading">Term Calendar</h2>
          <div class="sidebar-image-container">
              <img src="https://i.ibb.co/1fXMrzY7/weeks.png" alt="Sidebar image" id="sidebar-image">
          </div>
          <h2 class="sidebar-heading">Co-Curricular Timetable</h2>
          <div class="sidebar-image-container">
              <img src="https://i.ibb.co/kgykcqdq/Screenshot-2026-06-25-150932.png" alt="co-curricular">
          </div>
      </div>
  </div>

  <!-- Supabase client library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    /* ============================================================
       SUPABASE CONFIG — fill these in with your project's values
       (Dashboard → Project Settings → API)
       ============================================================ */
    const SUPABASE_URL = 'https://qvdnogycmnbctfwcionn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2ZG5vZ3ljbW5iY3Rmd2Npb25uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NzQ2NDgsImV4cCI6MjA5OTI1MDY0OH0.xg7TBLfsHY37GRNnHVvHXGPHHNbxOj9eMjR7MuyD0g8';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* --- Date / time widget (unchanged) --- */
    function ordinalSuffix(day) {
      if (day >= 11 && day <= 13) return 'th';
      switch (day % 10) {
        case 1: return 'st';
        case 2: return 'nd';
        case 3: return 'rd';
        default: return 'th';
      }
    }

    function updateDateTime() {
      const now = new Date();
      const dayNames   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const monthNames = ['January','February','March','April','May','June',
                          'July','August','September','October','November','December'];
      const dayName  = dayNames[now.getDay()];
      const date     = now.getDate();
      const suffix   = ordinalSuffix(date);
      const month    = monthNames[now.getMonth()];
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('live-date').textContent = `${dayName}, ${date}${suffix} ${month}`;
      document.getElementById('live-time').textContent = `${hh}:${mm}:${ss}`;
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    /* --- Announcements: fetch from Supabase --- */
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatTimestamp(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })
        + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    async function loadAnnouncements() {
      const list = document.getElementById('announcements-list');

      const { data, error } = await supabaseClient
        .from('announcements')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error loading announcements:', error);
        return;
      }

      if (!data || data.length === 0) {
        list.innerHTML = '<p class="no-announcements">No announcements posted yet.</p>';
        stopAutoScroll();
        return;
      }

      list.innerHTML = data.map(a => `
        <div class="announcement-card">
          ${a.image_url ? `<img class="card-image" src="${escapeHtml(a.image_url)}" alt="">` : ''}
          <div class="card-title">${escapeHtml(a.title || 'Announcement')}</div>
          <div class="card-body">${escapeHtml(a.body)}</div>
          <div class="card-meta">Posted: ${formatTimestamp(a.created_at)}</div>
        </div>
      `).join('');

      restartAutoScroll();
    }

    /* --- Auto-scroll (unchanged logic) --- */
    let autoScrollActive = false;
    let autoScrollToken = 0;
    let scrollAnimFrame = null;
    let scrollTimer = null;

    const AUTOSCROLL_PAUSE_MS = 3000;
    const AUTOSCROLL_SPEED_PX_PER_SEC = 35;

    function stopAutoScroll() {
      autoScrollActive = false;
      autoScrollToken++;
      if (scrollAnimFrame) cancelAnimationFrame(scrollAnimFrame);
      if (scrollTimer) clearTimeout(scrollTimer);
      scrollAnimFrame = null;
      scrollTimer = null;
    }

    function restartAutoScroll() {
      stopAutoScroll();
      autoScrollActive = true;
      const myToken = autoScrollToken;
      runAutoScrollLoop(myToken);
    }

    function wait(ms, token) {
      return new Promise(resolve => {
        scrollTimer = setTimeout(() => {
          if (token === autoScrollToken) resolve();
        }, ms);
      });
    }

    function animateScrollTo(el, target, token) {
      return new Promise(resolve => {
        const start = el.scrollTop;
        const distance = target - start;
        if (Math.abs(distance) < 1) { resolve(); return; }
        const duration = Math.max((Math.abs(distance) / AUTOSCROLL_SPEED_PX_PER_SEC) * 1000, 400);
        const startTime = performance.now();

        function step(now) {
          if (token !== autoScrollToken) return;
          const progress = Math.min((now - startTime) / duration, 1);
          el.scrollTop = start + distance * progress;
          if (progress < 1) {
            scrollAnimFrame = requestAnimationFrame(step);
          } else {
            resolve();
          }
        }
        scrollAnimFrame = requestAnimationFrame(step);
      });
    }

    async function runAutoScrollLoop(token) {
      const el = document.getElementById('announcements-list');
      if (!el) return;

      while (token === autoScrollToken) {
        const maxScroll = el.scrollHeight - el.clientHeight;

        if (maxScroll <= 5) {
          await wait(1500, token);
          continue;
        }

        await wait(AUTOSCROLL_PAUSE_MS, token);
        if (token !== autoScrollToken) return;

        await animateScrollTo(el, el.scrollHeight - el.clientHeight, token);
        if (token !== autoScrollToken) return;

        await wait(AUTOSCROLL_PAUSE_MS, token);
        if (token !== autoScrollToken) return;

        await animateScrollTo(el, 0, token);
      }
    }

    (function attachAutoScrollPauseHandlers() {
      const el = document.getElementById('announcements-list');
      if (!el) return;
      ['mouseenter', 'touchstart', 'wheel'].forEach(evt => {
        el.addEventListener(evt, stopAutoScroll, { passive: true });
      });
      ['mouseleave', 'touchend'].forEach(evt => {
        el.addEventListener(evt, restartAutoScroll, { passive: true });
      });
    })();

    let resizeDebounce;
    window.addEventListener('resize', function() {
      clearTimeout(resizeDebounce);
      resizeDebounce = setTimeout(restartAutoScroll, 300);
    });

    /* --- Initial load --- */
    loadAnnouncements();

    /* --- Live sync: Supabase Realtime pushes changes instantly --- */
    supabaseClient
      .channel('announcements-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'announcements' }, () => {
        loadAnnouncements();
      })
      .subscribe();

    /* --- Fallback poll every 15s in case a realtime event is missed --- */
    setInterval(loadAnnouncements, 15000);
  </script>

</body>
</html>
