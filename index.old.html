<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. John's College Notice Board</title>
    <style>

        h1 {
            font-family: 'Arial', sans-serif;
            font-size: 24px;
            margin-left: 16px;
            color: #ffffff;
            font-weight: bold;
            font-size: 34px;
            white-space: nowrap;
        }

        p1 {
            font-family: 'Times New Roman', serif;
            font-size: 25px;
            margin-left: 16px;
            color: #ffffff;
            white-space: nowrap;
            display: block;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f9f9f9;
        }

        .top-bar {
            width: 100%;
            height: 100px;
            background-color: #1d6737;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            overflow: hidden;
        }

        .top-bar img {
            height: 85px;
            width: 85px;
            object-fit: contain;
            flex-shrink: 0;
        }

        /* --- Time and Date --- */
        body {
        margin-left: 0px;
        min-height: 100vh;
        font-family: 'Times New Roman', serif;
        }

        .college-name {
            flex-shrink: 0;
            white-space: nowrap;
        }

        .datetime-widget {
            margin-left: auto;
            flex-shrink: 0;
            white-space: nowrap;
            text-align: right;
            padding-right: 16px;
        }



        /* --- DATE  <h1> --- */
        h1#live-date {
        font-size: 28px;
        color: #ffffff;
        white-space: nowrap;
        margin-left: 0;
        }

        /* --- TIME  <p> --- */
        p#live-time {
        font-size: 22px;
        font-weight: 400;
        color: #ffffff;
        letter-spacing: 0.08em;
        white-space: nowrap;
        margin-left: 0;
        }

        /* --- Page Layout --- */
        .page-layout {
            display: flex;
            min-height: calc(100vh - 100px);
        }

        .main-content {
            flex: 2;
            background-color: #f9f9f9;
        }

        .sidebar-divider {
            width: 4px;
            background-color: #1d6737;
            flex-shrink: 0;
        }

        .sidebar {
            flex: 1;
            background-color: #f9f9f9;
        }

        .sidebar-heading {
            font-family: 'Times New Roman', serif;
            font-size: 25px;
            color: #000000;
            text-align: center;
            padding: 16px 8px;
        }
    </style>
</head>
<body>
    
    <div class="top-bar">
       <!-- IMPORTANT: Replace the src below with the public URL of your hosted college logo image -->
       <!-- e.g. src="https://yourwebsite.com/images/college_logo.JPG" -->
       <img src="https://i.ibb.co/qLk93D58/college-logo.jpg" alt="college emblem" style="width:85px;height:85px;">

       <div class="college-name">
            <h1>St. John's College</h1> 
            <p1 style="margin-left: 16px;">Notice Board</p1>
       </div>
        <div class="datetime-widget">
            <h1 id="live-date">Loading date…</h1>
            <p  id="live-time">Loading time…</p>
        </div>
    </div>
  

  <div class="page-layout">
      <div class="main-content"></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar">
          <h2 id="sidebar-heading" class="sidebar-heading">Co-Curricular Timetable</h2>
      </div>
  </div>

  <!-- ============================================================
       SCRIPT — keep this as-is; it updates both elements every second
       ============================================================ -->
  <script>
    /**
     * Returns the ordinal suffix for a day number.
     * e.g. 1 → "st", 2 → "nd", 3 → "rd", 4 → "th"
     */
    function ordinalSuffix(day) {
      if (day >= 11 && day <= 13) return 'th';   // special teens
      switch (day % 10) {
        case 1: return 'st';
        case 2: return 'nd';
        case 3: return 'rd';
        default: return 'th';
      }
    }

    function updateDateTime() {
      const now = new Date();

      /* --- Date parts --- */
      const dayNames   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const monthNames = ['January','February','March','April','May','June',
                          'July','August','September','October','November','December'];

      const dayName  = dayNames[now.getDay()];
      const date     = now.getDate();
      const suffix   = ordinalSuffix(date);
      const month    = monthNames[now.getMonth()];

      /* --- Time parts (24-hour, zero-padded) --- */
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');

      /* --- Inject into the DOM --- */
      document.getElementById('live-date').textContent = `${dayName}, ${date}${suffix} ${month}`;
      document.getElementById('live-time').textContent = `${hh}:${mm}:${ss}`;
    }

    // Run immediately, then refresh every second
    updateDateTime();
    setInterval(updateDateTime, 1000);

    /* --- Alternating sidebar heading --- */
    const sidebarHeadings = ['Co-Curricular Timetable', 'Term Calendar'];
    let headingIndex = 0;

    function rotateSidebarHeading() {
      headingIndex = (headingIndex + 1) % sidebarHeadings.length;
      document.getElementById('sidebar-heading').textContent = sidebarHeadings[headingIndex];
    }

    setInterval(rotateSidebarHeading, 10000);
    </script>
        
   
    
    
</body>
</html>
